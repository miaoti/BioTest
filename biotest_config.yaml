# ============================================================================
# BioTest Grand Orchestrator Configuration
# ============================================================================
# This file drives the entire metamorphic testing pipeline:
#   Phase A (Spec Ingestion) → Phase B (MR Mining) → Phase C (Cross-Execution)
#
# Usage:  py -3.12 biotest.py                         # uses this config
#         py -3.12 biotest.py --config custom.yaml     # uses custom config
#         py -3.12 biotest.py --phase C                # run only Phase C
# ============================================================================

# ---------------------------------------------------------------------------
# Phase A: Specification Ingestion & RAG Index
# ---------------------------------------------------------------------------
phase_a:
  enabled: true

  # Which spec files to fetch from samtools/hts-specs GitHub repo
  specs:
    - file: VCFv4.5.tex
      format: VCF
      version: "4.5"
    - file: SAMv1.tex
      format: SAM
      version: "1.6"

  # GitHub source control
  github:
    repo: samtools/hts-specs
    branch: master
    # Pin to a specific commit SHA for reproducibility (null = HEAD)
    pin_sha: null

  # Embedding model for ChromaDB
  embedding_model: text-embedding-3-small
  chroma_collection: hts_specs

  # Rule-reachability filter (Phase 4 of SAM coverage plan).
  # Maps a capability-requirement tag to the list of spec section-title
  # substrings it applies to. A blindspot rule whose `section_id`
  # contains any of the listed substrings is flagged as requiring that
  # capability. If the Phase D primary target's runner does NOT declare
  # the matching `supports_<cap> = True` class attribute, the rule gets
  # a +20 priority penalty — beats the +10 format penalty — so the LLM
  # never burns a Top-K slot on rules it is structurally unable to
  # exercise (e.g. BAI/CSI index rules against a text-SAM parser).
  #
  # Operator-editable: add new capability tags here, set the matching
  # `supports_<cap> = True` on any runner that DOES implement that
  # capability, and the filter self-configures. Empty mapping = filter
  # disabled (every rule stays equally reachable).
  rule_capability_tags:
    index_io:
      - "binning index"
      - "Basic binning index"
      - "C source code for computing bin number"
      - "BAI"
      - "CSI"
    cram_io:
      - "CRAM"

# ---------------------------------------------------------------------------
# Phase B: Agentic RAG-Driven MR Mining
# ---------------------------------------------------------------------------
phase_b:
  enabled: true

  # Behavior themes to target — full 7-theme matrix. Bounded per-attempt
  # via recursion_limit=15 in agent/engine.py so slow LLM loops terminate.
  # `api_query_invariance` (Rank 5) is gated at runtime: the prompt
  # filter hides query_method_roundtrip when no enabled SUT sets
  # supports_query_methods=True, so listing it here is safe.
  themes:
    - ordering_invariance
    - semantics_preserving_permutation
    - normalization_invariance
    - rejection_invariance
    - coordinate_indexing_invariance
    - round_trip_invariance
    - api_query_invariance

  # NOTE: the formats to mine are NOT configured here. They are derived
  # automatically from `phase_c.format_filter` below — the single source
  # of truth for "which format is this run targeting". Advanced users can
  # override by uncommenting the `formats` key, but the default behavior
  # is to mine exactly the format Phase C will test (avoids off-scope
  # MRs and wasted LLM calls).
  # formats:
  #   - VCF

  # LLM configuration (reads API keys from .env)
  llm:
    # DeepSeek V3 — operator-chosen exclusive provider 2026-04-17 after
    # Gemini billing was depleted and Groq free-tier models proved
    # insufficient (decommissioned / TPM too small for 6k-token prompts).
    # Fallback chain (.env LLM_FALLBACK_MODELS) is deepseek-reasoner only.
    model: deepseek-chat
    temperature: 0.0
    max_retries: 3

  # Output
  registry_path: data/mr_registry.json

# ---------------------------------------------------------------------------
# Phase C: Cross-Execution & Differential Testing
# ---------------------------------------------------------------------------
phase_c:
  enabled: true

  # Seed corpus directory
  seeds_dir: seeds

  # Bug report output directory
  output_dir: bug_reports

  # DET report output
  det_report_path: data/det_report.json

  # ═══════════════════════════════════════════════════════════════════
  # ⭐  SINGLE SOURCE OF TRUTH — which format is this run targeting?  ⭐
  # ═══════════════════════════════════════════════════════════════════
  # Set to "VCF" or "SAM". This one knob cascades everywhere:
  #   - Phase B: mines MRs ONLY for this format (see phase_b.formats
  #              note above — auto-derived from this value).
  #   - Phase C: `run_test_suite(format_filter=...)` skips MRs of the
  #              other format when iterating the registry.
  #   - Phase D: SCC denominator, coverage whitelist (`target_filters`
  #              below), and blindspot tickets all scope to this format.
  # Leave at `null` to run BOTH formats (only do this if you have plenty
  # of LLM quota + time — it doubles Phase B's API calls).
  format_filter: VCF

  # Systems Under Test — real parser implementations from SUTfolder/
  # (only actual external parsers; the built-in reference normalizer is
  #  always included automatically by the orchestrator as a baseline)
  suts:
    - name: htsjdk
      language: Java
      enabled: true
      sut_path: SUTfolder/java/htsjdk
      adapter: harnesses/java/build/libs/biotest-harness-all.jar
      java_cmd: java
      timeout_s: 60
      # JaCoCo agent: append=true merges coverage across runs
      coverage_jvm_args: "-javaagent:coverage_artifacts/jacoco/jacocoagent.jar=destfile={destfile},append=true"
      coverage_exec_dir: coverage_artifacts/jacoco

    - name: biopython
      language: Python
      enabled: true
      sut_path: SUTfolder/python/biopython
      # No adapter path needed — imported in-process via pip
      timeout_s: 30

    - name: seqan3
      language: C++
      enabled: true
      sut_path: SUTfolder/cpp/seqan3
      adapter: harnesses/cpp/build/biotest_harness.exe
      # Coverage binary: built with -fprofile-arcs -ftest-coverage.
      # Build (current Windows/MinGW toolchain, traces harness only):
      #   g++ -std=c++20 -O0 -g -fprofile-arcs -ftest-coverage \
      #       harnesses/cpp/biotest_harness.cpp \
      #       -o harnesses/cpp/build/biotest_harness_cov.exe
      # NOTE: biotest_harness.cpp currently parses SAM as plain text and
      # does not link seqan3 (seqan3 requires C++23 + Linux ABI — BAM struct
      # packing fails on MinGW). Until the harness is rewritten under WSL2
      # to call seqan3::sam_file_input, gcovr coverage reflects only the
      # harness text parser, not seqan3. See harnesses/cpp/README.md.
      coverage_binary: harnesses/cpp/build/biotest_harness_cov.exe
      timeout_s: 60

    - name: pysam
      language: Python
      enabled: true
      # No sut_path — runs via Docker container (Windows) or pip package (Linux)
      timeout_s: 60
      # Coverage: Docker harness writes .coverage.* fragments to this dir
      coverage_dir: coverage_artifacts/pysam

    # vcfpy (2026-04-20) — pure-Python VCF parser (bihealth/vcfpy).
    # Independent reimplementation (NOT a wrapper over htslib), so it
    # exercises a distinct codepath from pysam/htslib and is fully
    # traceable by coverage.py. Installed via pip; runs in-process.
    - name: vcfpy
      language: Python
      enabled: true
      # No adapter path — imported in-process like biopython.
      timeout_s: 30

    # noodles-vcf (2026-04-20) — pure-Rust VCF parser (zaeleus/noodles).
    # Independent implementation; Rust std-only. Harness is a small
    # Cargo binary under harnesses/rust/noodles_harness/ that reads a
    # VCF and emits canonical JSON. Build with:
    #   cargo build --release --manifest-path harnesses/rust/noodles_harness/Cargo.toml
    # Coverage build (instrumented for cargo-llvm-cov):
    #   cargo llvm-cov --no-report run --manifest-path harnesses/rust/noodles_harness/Cargo.toml -- VCF <file>
    - name: noodles
      language: Rust
      enabled: true
      adapter: harnesses/rust/noodles_harness/target/release/noodles_harness.exe
      # Coverage binary (optional): built by `cargo llvm-cov` with
      # RUSTFLAGS="-C instrument-coverage" — runner will fall back to
      # the standard binary if the coverage build isn't present.
      coverage_binary: harnesses/rust/noodles_harness/target/llvm-cov-target/release/noodles_harness.exe
      llvm_profile_dir: coverage_artifacts/noodles
      timeout_s: 60

    # Gold-standard CLI reference (samtools + bcftools). Acts as the
    # tie-breaker voter in the consensus oracle — see
    # test_engine/oracles/consensus.py. Auto-detected when the binaries
    # are on PATH, so leaving this block out is fine; it's listed here
    # so operators can pin explicit paths on Windows (WSL/Docker wrappers).
    - name: htslib
      language: CLI
      enabled: true
      # bcftools_path: /usr/bin/bcftools   # optional; omit → shutil.which
      # samtools_path: /usr/bin/samtools
      timeout_s: 60

# ---------------------------------------------------------------------------
# Phase D: Feedback-Driven Loop & Termination Control
# ---------------------------------------------------------------------------
feedback_control:
  enabled: true
  max_iterations: 4           # Run 7 data showed weighted coverage plateaus
                              # by iter 3 (+0.4, +0.1, +0.2 pp on htsjdk/VCF);
                              # iters 5-8 are pure wall-time waste. Raise only
                              # when a new lever is validated to keep moving
                              # past iter 3.
  plateau_patience: 3         # kept — SCC is sparse; real stop now also fires
                              # on weighted-coverage delta (see loop_controller).
  target_scc_percent: 95.0    # Stop when SCC reaches this target
  timeout_minutes: 180        # Run 7 at 240 min still didn't hit the cap
                              # because iters can't be interrupted; 180 min
                              # is enough for 4 iterations at observed rate.
  # Coverage-delta early-stop (Run 7 lesson, 2026-04-20):
  # If weighted line coverage moves less than this many percentage
  # points for `coverage_plateau_patience` consecutive iterations, stop.
  # Kills runs that would otherwise burn budget on flat iterations
  # while SCC keeps inching up.
  min_coverage_delta_pp: 0.3
  coverage_plateau_patience: 2
  catastrophic_threshold: 0.5 # Fraction of enforced MRs demoted → halt
  catastrophic_min_sample: 5  # Halt only arms when enforced_count >= N
                              # (prevents spurious halts when Phase B mined
                              # only 1-2 MRs — 100% demotion of a tiny
                              # sample isn't statistically meaningful)
  # Primary Target: this SUT DRIVES the feedback loop.
  # SCC, code coverage hints, and blindspot tickets are derived from
  # this parser only. Other SUTs act as auxiliary differential oracles.
  #
  # 2026-04-20: pysam's VCF logic lives in Cython-compiled libcbcf.pyx →
  # .so, which coverage.py cannot trace. Valid coverage-measurable VCF
  # primaries are: htsjdk (JaCoCo), vcfpy (pure-Python coverage.py),
  # noodles (Rust, cargo-llvm-cov). pysam stays an enabled voter below,
  # but is no longer the coverage driver.
  primary_target: htsjdk

  # Prioritized-queueing window: each iteration shows the LLM the Top-K
  # highest-priority uncovered rules (sorted by complexity → proximity
  # → format relevance). Deferred rules resurface in the next ticket
  # once the re-sort sees them. "少食多餐": Quality of MRs for these
  # specific rules is the priority — see blindspot_builder.py.
  #
  # Raise this when running a stronger LLM (GPT-4o / Claude): 10–15 is
  # reasonable. Keep at 5 for Llama-70B / qwen3-coder:30b and smaller.
  max_rules_per_iteration: 5   # Run 7 showed Top-5 rules already exhaust the
                               # LLM's attention budget per ticket; raising to
                               # 8 added tokens without adding accepted MRs.
  # Source roots for code slice extraction (per SUT).
  # The blindspot builder searches these dirs to find source files
  # matching uncovered line ranges, then extracts actual code for the LLM.
  source_roots:
    htsjdk: SUTfolder/java/htsjdk/src/main/java
    biopython: .  # Uses sys.path resolution (site-packages)
    seqan3: SUTfolder/cpp/seqan3/include
    pysam: coverage_artifacts/pysam/source
    vcfpy: .      # Uses sys.path resolution (site-packages)
    noodles: SUTfolder/rust/noodles-vcf

  # -------------------------------------------------------------------------
  # Rank 1 lever: LLM-driven seed synthesis, in parallel to MR mining.
  # Each Phase D iteration (from iter 2 onward) feeds the same blindspot
  # ticket to a second LLM call and asks for raw VCF/SAM files that
  # exercise the uncovered code paths. Validated candidates land under
  # seeds/{vcf,sam}/synthetic_iter{N}_{hash8}.{vcf,sam} (gitignored) and
  # are auto-discovered by SeedCorpus at the next Phase C.
  #
  # Grounded in SeedMind (arXiv:2411.18143), SeedAIchemy (arXiv:2511.12448),
  # TitanFuzz (ISSTA'23), Fuzz4All (ICSE'24).
  # -------------------------------------------------------------------------
  seed_synthesis:
    enabled: true                # flip to false to disable the lever
    max_seeds_per_iteration: 5   # Run 7 showed 8 seeds/iter compounded
                                 # quadratically with MR count (Phase C tests
                                 # ≈ seeds × MRs). 5 is the sweet spot.
    max_file_bytes: 524288       # 500 KB, same cap as fetch_real_world.py

    # Phase 5 of SAM coverage plan — SeedMind-style generator synthesis.
    # One LLM call asks for a Python generator; the sandbox invokes it
    # max_seeds_per_iteration times with distinct seeds. Off-by-default
    # in new deployments (set true once raw-file synthesis is baselined
    # and the LLM-authored code sandbox is trusted). Grounded in
    # SeedMind (arXiv:2411.18143) — reports +29 % vs raw-file synthesis.
    generator_mode: true
    generator_timeout_s: 5.0     # per-invocation sandbox time cap

  # -------------------------------------------------------------------------
  # Rank 6 lever — LLM-driven MR SYNTHESIS (parallel to Rank 1 seed synth).
  #
  # WHAT IT DOES when `enabled: true`
  #   Each Phase D iteration, before the ReAct Phase B mining runs, the
  #   orchestrator sends the blindspot ticket to the LLM and asks for
  #   NEW metamorphic relations composed strictly over the existing
  #   transform whitelist. Output goes through the same compile_mr_output
  #   pipeline Phase B uses (whitelist + compound-group + `query_methods`
  #   validators all apply), then merges into data/mr_registry.json. The
  #   ReAct agent sees a slightly larger registry and Phase C picks up
  #   the new MRs in the same iteration.
  #
  # WHAT IT DOES when `enabled: false` (default)
  #   The synthesizer is not invoked. `mr_engine/agent/mr_synthesizer.py`
  #   code + unit tests still ship — they just never fire at runtime.
  #   Zero overhead.
  #
  # WHEN TO FLIP TRUE
  #   - You're chasing the data-model-bucket coverage on a new SUT and
  #     want the LLM to propose MRs beyond what Phase B's ReAct loop found.
  #   - You have LLM budget to spare and are willing to accept the measured
  #     cost: Run 7 = +1.1 pp at ~2x wall time, Run 8 = +0.7 pp at ~1.6x.
  #   - You want to reproduce Runs 7/8 exactly.
  #
  # WHEN TO LEAVE FALSE
  #   - You care about wall time (each iteration's MR-synth pass adds a
  #     multi-minute LLM round-trip + expands the registry, which slows
  #     every subsequent Phase C).
  #   - You're on a plateau where the marginal pp gain is inside LLM noise.
  #
  # Grounded in Fuzz4All (ICSE'24), PromptFuzz (CCS'24), ChatAFL (NDSS'24).
  # -------------------------------------------------------------------------
  mr_synthesis:
    enabled: false               # default after Run 6/7/8 data; see above
    max_mrs_per_iteration: 5     # cap per iter; raise carefully — grows
                                 # Phase C test count multiplicatively

  # -------------------------------------------------------------------------
  # Tier-2 prompt enrichment — extra context blocks added to Rank 6's
  # MR-synthesis prompt. Prompt-only: no new transforms, no new oracles,
  # no new runner contracts at execution time. Shipped off by default
  # because Runs 7/8 showed they added prompt tokens without measurable pp.
  # -------------------------------------------------------------------------
  prompt_enrichment:

    # TIER 2a — per-class blindspot block.
    #
    # WHAT IT DOES when `per_class_blindspot: true`
    #   biotest.py calls `_resolve_primary_coverage_report(cfg, primary,
    #   fmt)` which dispatches on the primary SUT name and returns the
    #   raw coverage report path (jacoco.xml for htsjdk, coverage.py JSON
    #   for biopython/pysam, gcovr JSON for seqan3). That path is fed to
    #   `blindspot_builder.compute_class_level_gaps()`, which returns the
    #   Top-N uncovered classes (default 10) filtered through
    #   `coverage.target_filters`. The ticket's `to_prompt_fragment()`
    #   then renders a "TOP UNCOVERED CLASSES / MODULES" section in the
    #   prompt text consumed by Rank 1 seed synth, Rank 6 MR synth, and
    #   the Phase B ReAct agent.
    #
    # WHAT IT DOES when `per_class_blindspot: false` (default)
    #   `_resolve_primary_coverage_report` is never called — class_gaps
    #   stays empty, the prompt block is skipped. Other blindspot signals
    #   (Top-K uncovered rules, code slices) are unaffected.
    #
    # WHEN TO FLIP TRUE
    #   - You're adding a new lever that needs class-granular steering
    #     (e.g., a writer-bucket-focused seed-synth prompt).
    #   - You're debugging "why doesn't the LLM target class X?".
    #   - You're reproducing Run 8.
    per_class_blindspot: false

    # TIER 2b — mutator-method catalog block.
    #
    # WHAT IT DOES when `mutator_catalog: true`
    #   biotest.py calls `primary_runner.discover_mutator_methods(fmt)`
    #   (available on any runner with `supports_mutator_methods = True`:
    #   reference, biopython, pysam today). The returned list of
    #   {name, returns, args} dicts is passed to `synthesize_mrs` which
    #   renders a "AVAILABLE MUTATOR METHODS" block in the Rank 6 prompt.
    #   The block is PROMPT-ONLY — the framework still dispatches MRs
    #   only through the allowed-transforms whitelist, so oracle soundness
    #   is inherited from existing transforms (`sut_write_roundtrip` etc.).
    #
    # WHAT IT DOES when `mutator_catalog: false` (default)
    #   Discovery is skipped. Even if Rank 6 is on, the LLM sees no
    #   mutator catalog. Zero overhead.
    #
    # WHEN TO FLIP TRUE
    #   - You have `mr_synthesis.enabled: true` AND you're chasing
    #     post-parse API-surface coverage (typical use case: data-model
    #     bucket). The catalog tells the LLM which mutators exist on the
    #     parsed type so it can compose transforms that exercise those
    #     code paths indirectly.
    #   - You're reproducing Run 8.
    #
    # WHEN TO LEAVE FALSE
    #   - Rank 6 is off — the catalog has no consumer, flip is a no-op.
    #   - Parser / writer buckets are your target (mutators don't help).
    mutator_catalog: false

# ---------------------------------------------------------------------------
# Coverage Collection (Phase D)
# ---------------------------------------------------------------------------
coverage:
  enabled: true
  # JaCoCo for htsjdk
  jacoco_report_dir: coverage_artifacts/jacoco
  jacoco_cli_jar: coverage_artifacts/jacoco/jacococli.jar
  jacoco_classfiles_dir: SUTfolder/java/htsjdk/build/classes
  # coverage.py for Python SUTs (biopython, vcfpy).
  # Each entry resolves (via PythonCoverageContext) to an installed
  # package directory that coverage.py instruments. Add a new pattern
  # here for every pure-Python SUT you onboard.
  coveragepy_data_file: coverage_artifacts/.coverage
  coveragepy_source_filter:
    - Bio.Align.sam
    - vcfpy
  # pysam Docker coverage (fragments combined from mounted volume)
  pysam_coverage_dir: coverage_artifacts/pysam
  pysam_source_filter:
    - pysam
  # gcovr for seqan3 (requires harness compiled with --coverage)
  gcovr_report_path: coverage_artifacts/gcovr.json
  gcovr_build_dir: harnesses/cpp/build
  gcovr_source_root: SUTfolder/cpp/seqan3/include

  # cargo-llvm-cov for noodles-vcf (Rust). NoodlesCoverageCollector runs
  # `cargo llvm-cov report --json` against the most recent instrumented
  # profile and aggregates per-file coverage scoped to the noodles-vcf
  # crate. Harness + coverage build instructions live in
  # harnesses/rust/noodles_harness/README.md.
  noodles_report_path: coverage_artifacts/noodles/llvm-cov.json
  noodles_manifest_path: harnesses/rust/noodles_harness/Cargo.toml
  noodles_profile_dir: coverage_artifacts/noodles

  # Format-aware whitelist: only these paths are relevant per format.
  # Prevents VCF coverage from polluting SAM feedback and vice versa.
  #
  # ==============================================================
  # IMPORTANT — PER-SUT ONBOARDING CONTRACT
  # ==============================================================
  # When you add a new SUT (Rust parser, etc.) you MUST write THREE
  # things, not two:
  #   1. a harness that reads a file and prints canonical JSON
  #   2. a `ParserRunner` subclass in `test_engine/runners/`
  #   3. a `coverage.target_filters.{VCF,SAM}.<your_sut_name>` block
  #      BELOW that tells the framework which source files/packages
  #      count as "in scope" for that SUT.
  # Without (3) the framework either sees no coverage for your SUT,
  # or pollutes the denominator with everything your SUT's library
  # ships. Neither is useful. The block is how we keep coverage
  # focused on YOUR parser's VCF (or SAM) code specifically.
  #
  # Pattern syntax per entry:
  #   "pkg/path"                 package only, all files
  #   "pkg/path::VCF,Variant"    include files starting with these
  #   "pkg/path::-JEXL,-Jexl"    exclude files starting with these
  #   "pkg/path::VCF,-BCF2"      mixed include + exclude
  #   "*JEXL*", "-*JEXL*"        wildcard contains-match (v2 syntax)
  #   "prefix*", "*suffix"       wildcard prefix/suffix match
  #
  # ==============================================================
  target_filters:
    VCF:
      # Java / htsjdk — JaCoCoCollector scope.
      # Includes the parser package, the VCF data-model package
      # (with JEXL filter-expression classes removed via -*JEXL*/-*Jexl*
      # substring wildcards — they sneak past prefix-only filters
      # because they start with "Variant" or "Genotype"), and the
      # writer subpackage scoped to VCF text writers only (BCF2*
      # implicitly excluded by the VCF,Variant prefix filter).
      htsjdk:
        - htsjdk/variant/vcf
        - htsjdk/variant/variantcontext::-JEXL,-Jexl,-*JEXL*,-*Jexl*
        - htsjdk/variant/variantcontext/writer::VCF,Variant
      # pysam — CoveragePyCollector / PysamDockerCoverageCollector scope.
      # pysam's VCF logic is in Cython-compiled libcbcf.pyx → .so, which
      # coverage.py cannot trace. Of pysam's .py files only bcftools.py is
      # VCF-specific (samtools.py / Pileup.py are SAM). The libcbcf/libcvcf
      # prefixes are listed for future-proofing if Cython coverage is ever
      # wired in (harmless today — no .pyx entries appear in the summary).
      pysam:
        - libcbcf
        - libcvcf
        - bcftools.py
      # vcfpy (bihealth) — pure-Python VCF parser. The entire package is
      # VCF-specific so the whole vcfpy tree is in scope.
      vcfpy:
        - vcfpy
      # noodles-vcf — Rust crate. NoodlesCoverageCollector filters the
      # cargo-llvm-cov JSON to files under the noodles-vcf crate source
      # tree. Keep the path substring matching the crate's sub-path
      # inside the noodles monorepo.
      noodles:
        - noodles-vcf
    SAM:
      # Java / htsjdk — htsjdk/samtools mixes SAM + BAM + CRAM +
      # CSI + index code; narrow to SAM-named classes only.
      htsjdk:
        - htsjdk/samtools::SAM,Sam
      # Biopython — CoveragePyCollector scope.
      biopython:
        - Bio/Align/sam
      # seqan3 — GcovrCollector substring scope on C++ paths.
      seqan3:
        - seqan3/io/sam_file
        - format_sam
        - cigar
      # pysam — shared scope for SAM (via libhts).
      pysam:
        - pysam

# ---------------------------------------------------------------------------
# CI Integration (future)
# ---------------------------------------------------------------------------
ci_integration:
  auto_open_issue: false
  github_token_env: GITHUB_TOKEN

# ---------------------------------------------------------------------------
# Global Settings
# ---------------------------------------------------------------------------
global:
  log_level: INFO       # DEBUG | INFO | WARNING | ERROR
  parallel: false       # Future: parallel runner execution
  seed_rng: 42          # Master RNG seed for reproducibility
